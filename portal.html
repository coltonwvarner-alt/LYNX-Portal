<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uncommon Spirits | Retailer Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
:root{
  --navy:#0C2340; --navy2:#13304F; --brass:#B9913B; --brass2:#9A772C;
  --paper:#F7F4EE; --card:#FFFFFF; --ink:#1C2430; --ink2:#5A6472; --ink3:#8B93A0;
  --line:#E6E1D6; --green:#1E6B4F; --amber:#B45309; --red:#8E2A2A;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--paper);color:var(--ink);font-size:14px}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit}

/* ===== LOGIN ===== */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:
  linear-gradient(160deg,var(--navy) 0%,#0A1B30 100%);padding:20px}
.login-card{background:var(--card);border-radius:10px;padding:42px 38px;width:100%;max-width:400px;
  box-shadow:0 24px 60px rgba(0,0,0,.4)}
.wordmark{font-family:'Fraunces',serif;font-weight:700;font-size:26px;color:var(--navy);text-align:center;letter-spacing:.5px}
.wordsub{text-align:center;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--brass2);
  font-weight:600;margin:6px 0 28px;display:flex;align-items:center;gap:10px;justify-content:center}
.wordsub::before,.wordsub::after{content:'';flex:1;height:1px;background:var(--line)}
.fld{margin-bottom:14px}
.fld label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--ink2);margin-bottom:5px}
.fld input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:6px;font-size:14px;background:#FCFBF8}
.fld input:focus{outline:none;border-color:var(--brass)}
.btn-gold{width:100%;padding:13px;background:var(--brass);color:#fff;border:none;border-radius:6px;
  font-weight:700;font-size:14px;letter-spacing:.5px;margin-top:6px}
.btn-gold:hover{background:var(--brass2)}
.btn-gold:disabled{opacity:.6;cursor:wait}
.login-err{color:var(--red);font-size:12px;min-height:16px;margin-top:10px;text-align:center}
.login-foot{text-align:center;font-size:11px;color:var(--ink3);margin-top:22px}

/* ===== APP SHELL ===== */
#app{display:none;min-height:100vh}
.topbar{background:var(--navy);color:#fff;position:sticky;top:0;z-index:50;
  border-bottom:3px solid var(--brass)}
.topbar-in{max-width:1180px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:16px}
.tb-brand{font-family:'Fraunces',serif;font-weight:700;font-size:19px;letter-spacing:.4px;flex-shrink:0}
.tb-brand small{display:block;font-family:'Inter';font-size:9px;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--brass);font-weight:600;margin-top:1px}
.tb-acct{font-size:12px;color:#C7D2E0;margin-left:auto;text-align:right;line-height:1.4}
.tb-acct b{color:#fff;display:block;font-size:13px}
.tb-cart{background:var(--brass);color:#fff;border:none;border-radius:6px;padding:9px 16px;font-weight:700;
  font-size:13px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.tb-cart .cnum{background:#fff;color:var(--navy);border-radius:10px;padding:1px 8px;font-size:12px}
.tb-out{background:none;border:1px solid rgba(255,255,255,.25);color:#C7D2E0;border-radius:6px;
  padding:9px 12px;font-size:12px;flex-shrink:0}
.tb-out:hover{border-color:#fff;color:#fff}
.staff-band{background:#3E2F0E;color:#E8CF96;text-align:center;font-size:12px;padding:6px;font-weight:600}

/* ===== TOOLBAR ===== */
.main{max-width:1180px;margin:0 auto;padding:22px 20px 80px}
.viewtabs{display:flex;gap:8px;margin-bottom:18px}
.vtab{background:none;border:none;padding:8px 2px;font-size:14px;font-weight:600;color:var(--ink3);
  border-bottom:2px solid transparent}
.vtab.on{color:var(--navy);border-color:var(--brass)}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:20px}
.search{flex:1;min-width:220px;padding:10px 14px;border:1px solid var(--line);border-radius:7px;
  font-size:14px;background:var(--card)}
.search:focus{outline:none;border-color:var(--brass)}
.chiprow{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:7px 14px;border:1px solid var(--line);background:var(--card);border-radius:18px;
  font-size:12px;font-weight:600;color:var(--ink2)}
.chip.on{background:var(--navy);color:#fff;border-color:var(--navy)}

/* ===== PRODUCT GRID ===== */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
.pcard{background:var(--card);border:1px solid var(--line);border-radius:9px;overflow:hidden;
  display:flex;flex-direction:column;transition:box-shadow .15s}
.pcard:hover{box-shadow:0 8px 24px rgba(12,35,64,.10)}
.pimg{height:185px;background:#F1EDE3;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.pimg img{width:100%;height:100%;object-fit:contain;padding:12px}
.pmono{font-family:'Fraunces',serif;font-size:46px;color:#D8D0BD;font-weight:700}
.stockpill{position:absolute;top:10px;right:10px;font-size:10px;font-weight:700;letter-spacing:.5px;
  text-transform:uppercase;padding:4px 9px;border-radius:11px;background:#fff;display:flex;align-items:center;gap:5px;
  box-shadow:0 1px 4px rgba(0,0,0,.12)}
.dot{width:7px;height:7px;border-radius:50%}
.pbody{padding:16px;display:flex;flex-direction:column;flex:1}
.psup{font-size:10px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:var(--brass2);margin-bottom:4px}
.pname{font-family:'Fraunces',serif;font-weight:600;font-size:18px;color:var(--navy);line-height:1.25}
.pdesc{font-size:12.5px;color:var(--ink2);line-height:1.5;margin:8px 0 12px;flex:1}
.ladder{border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:9px 0;margin-bottom:11px}
.ladder-h{font-size:9.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink3);margin-bottom:6px}
.lrow{display:flex;justify-content:space-between;font-size:12.5px;padding:2px 0;color:var(--ink2)}
.lrow b{color:var(--ink);font-variant-numeric:tabular-nums;font-weight:600}
.pstock{font-size:12px;color:var(--ink2);margin-bottom:11px;display:flex;align-items:center;gap:6px}
.pstock b{color:var(--ink)}
.addrow{display:flex;gap:8px}
.stepper{display:flex;border:1px solid var(--line);border-radius:6px;overflow:hidden}
.stepper button{width:32px;background:#FAF8F3;border:none;font-size:16px;color:var(--ink2)}
.stepper input{width:44px;border:none;text-align:center;font-size:14px;font-weight:600}
.stepper input:focus{outline:none}
.addbtn{flex:1;background:var(--navy);color:#fff;border:none;border-radius:6px;font-weight:700;font-size:13px}
.addbtn:hover{background:var(--navy2)}
.addbtn:disabled{background:#C9CFD8;cursor:not-allowed}
.empty{text-align:center;padding:60px 20px;color:var(--ink3)}

/* ===== CART DRAWER ===== */
.scrim{position:fixed;inset:0;background:rgba(10,20,35,.5);display:none;z-index:90}
.scrim.on{display:block}
.drawer{position:fixed;top:0;right:-440px;width:100%;max-width:420px;height:100vh;background:var(--card);
  z-index:100;transition:right .25s;display:flex;flex-direction:column;box-shadow:-12px 0 40px rgba(0,0,0,.25)}
.drawer.on{right:0}
.dhead{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.dhead h2{font-family:'Fraunces',serif;font-size:19px;color:var(--navy)}
.dclose{background:none;border:none;font-size:22px;color:var(--ink3)}
.dbody{flex:1;overflow-y:auto;padding:16px 20px}
.cline{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);align-items:flex-start}
.cline-info{flex:1}
.cline-name{font-family:'Fraunces',serif;font-weight:600;font-size:14.5px;color:var(--navy)}
.cline-meta{font-size:11.5px;color:var(--ink2);margin-top:2px}
.cline-price{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;text-align:right;min-width:70px}
.cline-rm{background:none;border:none;color:var(--red);font-size:11px;padding:0;margin-top:4px}
.dnotes{margin-top:14px}
.dnotes label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--ink2)}
.dnotes textarea{width:100%;border:1px solid var(--line);border-radius:6px;padding:10px;font-size:13px;
  min-height:64px;margin-top:5px;resize:vertical;background:#FCFBF8}
.dfoot{padding:16px 20px;border-top:1px solid var(--line);background:#FCFBF8}
.dtotal{display:flex;justify-content:space-between;font-size:14px;margin-bottom:4px}
.dtotal b{font-variant-numeric:tabular-nums}
.dnote{font-size:10.5px;color:var(--ink3);margin-bottom:12px}
.dempty{text-align:center;color:var(--ink3);padding:40px 0}

/* ===== ORDERS ===== */
.ocard{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:16px 18px;margin-bottom:12px}
.ohead{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.odate{font-weight:600}
.ostatus{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:4px 11px;border-radius:11px}
.st-pending{background:#FBF3DD;color:#8A6A14}
.st-processed{background:#E4F1E9;color:var(--green)}
.st-cancelled{background:#F4E4E4;color:var(--red)}
.olines{margin-top:10px;font-size:12.5px;color:var(--ink2)}
.olines div{display:flex;justify-content:space-between;padding:3px 0}
.otot{border-top:1px solid var(--line);margin-top:6px;padding-top:6px;font-weight:700;color:var(--ink);
  display:flex;justify-content:space-between;font-size:13px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy);
  color:#fff;padding:11px 22px;border-radius:7px;font-size:13px;font-weight:600;transition:transform .25s;z-index:200;
  border-left:3px solid var(--brass)}
.toast.on{transform:translateX(-50%) translateY(0)}
@media(max-width:560px){
  .tb-acct{display:none}
  .grid{grid-template-columns:1fr 1fr;gap:10px}
  .pimg{height:130px}
  .pname{font-size:15px}
  .pbody{padding:11px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div class="wordmark">Uncommon Spirits</div>
    <div class="wordsub">Retailer Portal</div>
    <div class="fld"><label>Email</label><input type="email" id="liEmail" autocomplete="username"></div>
    <div class="fld"><label>Password</label><input type="password" id="liPass" autocomplete="current-password"></div>
    <button class="btn-gold" id="liBtn" onclick="doLogin()">Sign In</button>
    <div class="login-err" id="liErr"></div>
    <div class="login-foot">Distributed by Lynx Distribution Group, Phoenix AZ<br>Need access? Contact your sales rep.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="staff-band" id="staffBand" style="display:none">Staff preview. Pricing shown is the off-premise schedule.</div>
  <div class="topbar"><div class="topbar-in">
    <div class="tb-brand">Uncommon Spirits<small>Retailer Portal</small></div>
    <div class="tb-acct" id="acctChip"></div>
    <button class="tb-cart" onclick="openDrawer()">Cart <span class="cnum" id="cartCnt">0</span></button>
    <button class="tb-out" onclick="doLogout()">Sign Out</button>
  </div></div>

  <div class="main">
    <div class="viewtabs">
      <button class="vtab on" id="vtCat" onclick="showView('cat')">Catalog</button>
      <button class="vtab" id="vtOrd" onclick="showView('ord')">My Orders</button>
    </div>

    <div id="viewCat">
      <div class="toolbar">
        <input class="search" id="searchBox" placeholder="Search products..." oninput="renderGrid()">
        <div class="chiprow" id="supChips"></div>
      </div>
      <div class="grid" id="grid"></div>
      <div class="empty" id="gridEmpty" style="display:none">No products match your search.</div>
    </div>

    <div id="viewOrd" style="display:none">
      <div id="ordersList"></div>
    </div>
  </div>
</div>

<!-- CART DRAWER -->
<div class="scrim" id="scrim" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="dhead"><h2>Order Request</h2><button class="dclose" onclick="closeDrawer()">&times;</button></div>
  <div class="dbody" id="drawerBody"></div>
  <div class="dfoot" id="drawerFoot"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONFIG (same Supabase project as the LYNX CRM)
// ============================================================
const SB_URL='https://bhyytzxfwfhbqwlfqbqm.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJoeXl0enhmd2ZoYnF3bGZxYnFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1Nzk0MzksImV4cCI6MjA5MTE1NTQzOX0.mC-u6d-6lOoX0y4Xyppk1ESlW5FaXGU_K7JLHwEcf2A';
const EJS_SERVICE='service_tm9myeb';
const EJS_TEMPLATE='template_g0z06nf';
const EJS_KEY='Px_6ATu3eFttAjkxB';
const NOTIFY_EMAIL='colton@uncommonspiritsco.com';

const _SB=supabase.createClient(SB_URL,SB_KEY);
emailjs.init(EJS_KEY);

let PROFILE=null;       // {role, account_id, accountName, accountType}
let CATALOG=[];          // rows from portal_catalog()
let CART=[];             // [{id, sku, sup, bpc, cases}]
let supFilter='ALL';
const TIER_LABELS=['Single Bottle','1+ Cases','3+ Cases','5+ Cases'];
const fmt=n=>'$'+(+n).toFixed(2);

// ============================================================
// AUTH
// ============================================================
async function doLogin(){
  const btn=document.getElementById('liBtn');const err=document.getElementById('liErr');
  err.textContent='';btn.disabled=true;btn.textContent='Signing in...';
  const {error}=await _SB.auth.signInWithPassword({
    email:document.getElementById('liEmail').value.trim(),
    password:document.getElementById('liPass').value
  });
  btn.disabled=false;btn.textContent='Sign In';
  if(error){err.textContent='Sign in failed. Check your email and password.';return;}
  await boot();
}
async function doLogout(){await _SB.auth.signOut();location.reload();}
document.getElementById('liPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

async function boot(){
  const {data:{session}}=await _SB.auth.getSession();
  if(!session)return;
  // role + linked account
  const {data:roleRow}=await _SB.from('user_roles').select('role,account_id').eq('user_id',session.user.id).maybeSingle();
  PROFILE={role:roleRow?.role||'retailer',account_id:roleRow?.account_id||null,accountName:'',accountType:'off'};
  if(PROFILE.account_id){
    const {data:acct}=await _SB.from('accounts').select('name,type').eq('id',PROFILE.account_id).maybeSingle();
    if(acct){PROFILE.accountName=acct.name;PROFILE.accountType=acct.type||'off';}
  }
  const isStaff=PROFILE.role==='admin'||PROFILE.role==='staff';
  if(isStaff){
    document.getElementById('staffBand').style.display='block';
    PROFILE.accountName='Staff Preview';
  }
  if(!isStaff && !PROFILE.account_id){
    document.getElementById('liErr').textContent='Your login is not linked to an account yet. Contact your rep.';
    await _SB.auth.signOut();return;
  }
  document.getElementById('acctChip').innerHTML=
    `<b>${PROFILE.accountName}</b>${PROFILE.account_id?(PROFILE.accountType==='on'?'On-Premise pricing':'Off-Premise pricing'):''}`;
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('app').style.display='block';
  await loadCatalog();
}

// ============================================================
// CATALOG
// ============================================================
async function loadCatalog(){
  const {data,error}=await _SB.rpc('portal_catalog');
  if(error){toast('Could not load catalog');console.error(error);return;}
  CATALOG=(data||[]).filter(p=>Array.isArray(p.pricing)&&p.pricing.some(v=>v!=null));
  buildChips();renderGrid();
}
function buildChips(){
  const sups=[...new Set(CATALOG.map(p=>p.sup))].sort();
  document.getElementById('supChips').innerHTML=
    `<button class="chip ${supFilter==='ALL'?'on':''}" onclick="setSup('ALL')">All</button>`+
    sups.map(s=>`<button class="chip ${supFilter===s?'on':''}" onclick="setSup('${s.replace(/'/g,"\\'")}')">${s}</button>`).join('');
}
function setSup(s){supFilter=s;buildChips();renderGrid();}

function stockInfo(p){
  const cs=p.bpc?Math.floor(p.qty/p.bpc):0;
  if(p.qty<=0)return{cs,txt:'Out of Stock',color:'var(--red)'};
  if(cs<3)return{cs,txt:'Low Stock',color:'var(--amber)'};
  return{cs,txt:'In Stock',color:'var(--green)'};
}
function renderGrid(){
  const q=(document.getElementById('searchBox').value||'').toLowerCase();
  const rows=CATALOG.filter(p=>
    (supFilter==='ALL'||p.sup===supFilter)&&
    (p.sku.toLowerCase().includes(q)||p.sup.toLowerCase().includes(q)||(p.description||'').toLowerCase().includes(q)));
  document.getElementById('gridEmpty').style.display=rows.length?'none':'block';
  document.getElementById('grid').innerHTML=rows.map(p=>{
    const st=stockInfo(p);
    const inCart=CART.find(c=>c.id===p.id);
    const ladder=p.pricing.map((v,i)=>v==null?'':
      `<div class="lrow"><span>${TIER_LABELS[i]}</span><b>${fmt(v)}</b></div>`).join('');
    const initials=p.sku.split(' ').map(w=>w[0]).join('').slice(0,3).toUpperCase();
    return `<div class="pcard">
      <div class="pimg">
        ${p.image_url?`<img src="${p.image_url}" alt="${p.sku}" loading="lazy">`:`<div class="pmono">${initials}</div>`}
        <div class="stockpill"><span class="dot" style="background:${st.color}"></span>${st.txt}</div>
      </div>
      <div class="pbody">
        <div class="psup">${p.sup}</div>
        <div class="pname">${p.sku}</div>
        <div class="pdesc">${p.description||''}</div>
        <div class="ladder"><div class="ladder-h">Your price, per bottle</div>${ladder}</div>
        <div class="pstock"><span class="dot" style="background:${st.color}"></span>
          <span><b>${p.qty}</b> bottles on hand (${st.cs} cs of ${p.bpc})${p.srp?` &middot; SRP ${fmt(p.srp)}`:''}</span></div>
        <div class="addrow">
          <div class="stepper">
            <button onclick="stepQty('${p.id}',-1)">&minus;</button>
            <input id="qty_${p.id}" type="number" min="1" max="${st.cs}" value="${inCart?inCart.cases:1}">
            <button onclick="stepQty('${p.id}',1)">+</button>
          </div>
          <button class="addbtn" ${st.cs<1?'disabled':''} onclick="addToCart('${p.id}')">
            ${st.cs<1?'Out of Stock':(inCart?'Update Cart':'Add Cases')}</button>
        </div>
      </div>
    </div>`;
  }).join('');
}
function stepQty(id,d){
  const el=document.getElementById('qty_'+id);if(!el)return;
  const max=parseInt(el.max)||1;
  el.value=Math.min(max,Math.max(1,(parseInt(el.value)||1)+d));
}

// ============================================================
// CART
// ============================================================
function priceFor(p,cases){
  // pricing array order: [single bottle, 1+ case, 3+ case, 5+ case], per bottle
  let idx=cases>=5?3:cases>=3?2:1;
  while(idx>0&&p.pricing[idx]==null)idx--;
  return p.pricing[idx]!=null?+p.pricing[idx]:(p.pricing.find(v=>v!=null)||0);
}
function addToCart(id){
  const p=CATALOG.find(x=>x.id===id);if(!p)return;
  const st=stockInfo(p);
  const cases=Math.min(st.cs,Math.max(1,parseInt(document.getElementById('qty_'+id).value)||1));
  const ex=CART.find(c=>c.id===id);
  if(ex)ex.cases=cases;else CART.push({id,sku:p.sku,sup:p.sup,bpc:p.bpc,cases});
  updateCartBadge();renderGrid();toast(`${p.sku}: ${cases} case${cases>1?'s':''} in cart`);
}
function removeFromCart(id){CART=CART.filter(c=>c.id!==id);updateCartBadge();renderDrawer();renderGrid();}
function updateCartBadge(){document.getElementById('cartCnt').textContent=CART.reduce((s,c)=>s+c.cases,0);}
function cartLines(){
  return CART.map(c=>{
    const p=CATALOG.find(x=>x.id===c.id);
    const unit=p?priceFor(p,c.cases):0;
    const bottles=c.cases*c.bpc;
    return{...c,bottles,unit,total:unit*bottles};
  });
}
function openDrawer(){renderDrawer();document.getElementById('scrim').classList.add('on');document.getElementById('drawer').classList.add('on');}
function closeDrawer(){document.getElementById('scrim').classList.remove('on');document.getElementById('drawer').classList.remove('on');}
function renderDrawer(){
  const body=document.getElementById('drawerBody');const foot=document.getElementById('drawerFoot');
  if(!CART.length){
    body.innerHTML='<div class="dempty">Your cart is empty.<br>Add cases from the catalog.</div>';
    foot.innerHTML='';return;
  }
  const lines=cartLines();
  body.innerHTML=lines.map(l=>`
    <div class="cline">
      <div class="cline-info">
        <div class="cline-name">${l.sku}</div>
        <div class="cline-meta">${l.cases} case${l.cases>1?'s':''} &middot; ${l.bottles} btl &middot; ${fmt(l.unit)}/btl</div>
        <button class="cline-rm" onclick="removeFromCart('${l.id}')">Remove</button>
      </div>
      <div class="cline-price">${fmt(l.total)}</div>
    </div>`).join('')+
    `<div class="dnotes"><label>Order Notes (optional)</label>
      <textarea id="orderNotes" placeholder="Delivery instructions, single bottle requests, etc."></textarea></div>`;
  const total=lines.reduce((s,l)=>s+l.total,0);
  foot.innerHTML=`
    <div class="dtotal"><span>Estimated total</span><b>${fmt(total)}</b></div>
    <div class="dnote">Final pricing confirmed on your invoice. Volume tiers apply per product.</div>
    <button class="btn-gold" id="submitBtn" onclick="submitOrder()">Submit Order Request</button>`;
}

async function submitOrder(){
  const btn=document.getElementById('submitBtn');
  btn.disabled=true;btn.textContent='Submitting...';
  const lines=cartLines().map(l=>({sku:l.sku,sup:l.sup,cases:l.cases,bpc:l.bpc,bottles:l.bottles,price_per_btl:l.unit,est_total:+l.total.toFixed(2)}));
  const notes=document.getElementById('orderNotes')?.value.trim()||'';
  const total=lines.reduce((s,l)=>s+l.est_total,0);
  const {data:{session}}=await _SB.auth.getSession();
  const {error}=await _SB.from('portal_orders').insert({
    account_id:PROFILE.account_id,created_by:session.user.id,lines,notes});
  if(error){
    btn.disabled=false;btn.textContent='Submit Order Request';
    toast('Order failed. Try again or call your rep.');console.error(error);return;
  }
  try{
    await emailjs.send(EJS_SERVICE,EJS_TEMPLATE,{
      to_email:NOTIFY_EMAIL,
      rep_name:'Retailer Portal',
      account_name:PROFILE.accountName,
      account_type:PROFILE.accountType==='on'?'On-Premise':'Off-Premise',
      account_address:lines.map(l=>`${l.cases}cs ${l.sku}`).join(', '),
      account_city:'',account_phone:'',account_contact:'',
      payment_method:notes||'No notes',
      sale_total:fmt(total),
      sale_date:new Date().toLocaleDateString(),
      source:'Portal Order Request',
      subject:`Portal Order: ${PROFILE.accountName} (${fmt(total)})`
    });
  }catch(e){console.error('Email notify failed',e);}
  CART=[];updateCartBadge();closeDrawer();renderGrid();
  toast('Order request submitted. We will confirm shortly.');
  showView('ord');
}

// ============================================================
// ORDERS VIEW
// ============================================================
function showView(v){
  document.getElementById('vtCat').classList.toggle('on',v==='cat');
  document.getElementById('vtOrd').classList.toggle('on',v==='ord');
  document.getElementById('viewCat').style.display=v==='cat'?'block':'none';
  document.getElementById('viewOrd').style.display=v==='ord'?'block':'none';
  if(v==='ord')renderOrders();
}
async function renderOrders(){
  const el=document.getElementById('ordersList');
  el.innerHTML='<div class="empty">Loading orders...</div>';
  let q=_SB.from('portal_orders').select('*').order('created_at',{ascending:false}).limit(50);
  if(PROFILE.account_id)q=q.eq('account_id',PROFILE.account_id);
  const {data,error}=await q;
  if(error){el.innerHTML='<div class="empty">Could not load orders.</div>';return;}
  if(!data||!data.length){el.innerHTML='<div class="empty">No orders yet. Your submitted requests will appear here.</div>';return;}
  el.innerHTML=data.map(o=>{
    const lines=(o.lines||[]);
    const total=lines.reduce((s,l)=>s+(+l.est_total||0),0);
    return `<div class="ocard">
      <div class="ohead">
        <span class="odate">${new Date(o.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span>
        <span class="ostatus st-${o.status}">${o.status}</span>
      </div>
      <div class="olines">
        ${lines.map(l=>`<div><span>${l.cases}cs &times; ${l.sku}</span><span>${fmt(l.est_total||0)}</span></div>`).join('')}
        ${o.notes?`<div style="font-style:italic;color:var(--ink3)">Note: ${o.notes}</div>`:''}
        <div class="otot"><span>Estimated total</span><span>${fmt(total)}</span></div>
      </div>
    </div>`;
  }).join('');
}

// ============================================================
// UTIL + INIT
// ============================================================
let toastT;
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('on'),3000);
}
boot();
</script>
